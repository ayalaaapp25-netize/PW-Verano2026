<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Facebook</title>
    <link rel="stylesheet" href="styleFacebook.css">
</head>
<body>

<div class="contenedor">

    <div class="izquierda">

        <h1 class="logo">facebook</h1>

        <p class="descripcion">
            Facebook te ayuda a comunicarte y compartir con las personas que forman parte de tu vida.
        </p>

    </div>

    <div class="derecha">

        <div class="sesion">

            <input type="text" placeholder="Correo electrónico o número de teléfono">

            <input type="password" placeholder="Contraseña">

            <button class="btn-sesion">
                Iniciar sesión
            </button>

            <a href="#" class="olvido">
                ¿Olvidaste tu contraseña?
            </a>

            <hr class="linea">

            <a href="#" class="btn-crear">
                Crear cuenta nueva
            </a>

        </div>

        <p class="pagina">
            <b>Crea una página</b> para una celebridad, una marca o un negocio.
        </p>

    </div>

</div>

</body>
</html>
